services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vigiparl
      POSTGRES_PASSWORD: vigiparl
      POSTGRES_DB: vigiparl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info

  scheduler:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

volumes:
  postgres_data:
